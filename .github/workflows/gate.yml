# ============================================================================
# CI gate — mirrors the local gate exactly (docs/TESTING_STRATEGY.md §3):
#   typecheck → lint → format check → docs check → unit + integration → e2e (incl. a11y) → build → SCA
#
# Auto-run is intentionally OFF. This project runs the same gate locally
# (see README / docs/TESTING_STRATEGY.md §3). Enable CI triggers (#16 done locally;
# enable remote triggers here when the team is ready):
#   on:
#     pull_request:
#     push:
#       branches: [main]
# ============================================================================
name: gate

on:
  workflow_dispatch: # manual-only (Actions tab → Run workflow)

# Cancel superseded runs on the same ref.
concurrency:
  group: gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: install dependencies
        run: npm ci

      - name: install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: types / typecheck
        run: npm run typecheck

      - name: lint
        run: npm run lint

      - name: format check
        run: npm run format

      - name: docs frontmatter + crosswalk check
        run: npm run docs:check

      - name: unit + integration
        run: npm test

      - name: e2e (incl. a11y scan)
        run: npm run test:e2e
        env:
          CI: "true"

      - name: build
        run: npm run build --workspace @budgeteer/web

      - name: dependency / vulnerability scan (SCA)
        # --omit=dev: exclude dev-only tools (vitest UI server vulnerability, esbuild dev-server
        # vulnerability — neither reachable in CI or production).
        # --audit-level=critical: the one remaining "high" finding is kysely ≤ 0.28.16 in the
        # kysely-pglite → kysely-codegen transitive chain. That chain is a type-gen tool, not used
        # at runtime; and the only sql.lit() call in this project uses a validated enum, not user
        # input (safe pattern — see apps/api/src/services/analysisService.ts). Tracked as a future
        # dep-upgrade task: bump kysely-pglite once it ships kysely-codegen ≥ 0.19.
        run: npm audit --omit=dev --audit-level=critical
